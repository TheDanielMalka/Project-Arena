name: CI - Code Quality and Automation

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, edited]
    branches: [ main ]
  issues:
    types: [opened]

jobs:
  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y tesseract-ocr
        pip install pytest flake8 mypy
        pip install -r requirements.txt

    - name: Run flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=venv || true

    - name: Run mypy
      run: |
        mypy . --ignore-missing-imports --exclude venv || true

    - name: Find and run matching tests
      run: |
        BASE_SHA="${{ github.event.pull_request.base.sha }}"
        HEAD_SHA="${{ github.event.pull_request.head.sha }}"
        CHANGED="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"

        echo "Changed files:"
        echo "$CHANGED"

        TEST_FILES=()
        RUN_ALL_ENGINE=0
        RUN_CLIENT_SMOKE=0

        for FILE in $CHANGED; do
          if [[ "$FILE" == client/*.py ]]; then
            RUN_CLIENT_SMOKE=1
          fi

          # If test file itself changed, run it directly
          if [[ "$FILE" == engine/tests/test_*.py ]]; then
            echo "Changed test file: $FILE"
            TEST_FILES+=("$FILE")
            continue
          fi

          # Engine source file -> matching engine test
          if [[ "$FILE" =~ ^engine/src/.+\.py$ || "$FILE" == "engine/main.py" ]]; then
            BASENAME=$(basename "$FILE" .py)
            TEST_PATH="engine/tests/test_${BASENAME}.py"
            if [ -f "$TEST_PATH" ]; then
              echo "Found test for $BASENAME: $TEST_PATH"
              TEST_FILES+=("$TEST_PATH")
            else
              # Engine code changed without a direct mapped test -> run full engine tests
              RUN_ALL_ENGINE=1
            fi
          fi

          # Global/python config changes -> run full engine tests
          if [[ "$FILE" == "requirements.txt" || "$FILE" == "engine/requirements.txt" || "$FILE" == ".github/workflows/arena.yml" ]]; then
            RUN_ALL_ENGINE=1
          fi
        done

        if [ "$RUN_ALL_ENGINE" -eq 1 ]; then
          echo "Running full engine test suite"
          pytest engine/tests -v
        elif [ ${#TEST_FILES[@]} -gt 0 ]; then
          UNIQUE_TEST_FILES=$(printf "%s\n" "${TEST_FILES[@]}" | sort -u | tr '\n' ' ')
          echo "Running targeted tests: $UNIQUE_TEST_FILES"
          pytest $UNIQUE_TEST_FILES -v
        else
          echo "No matching tests found - skipping"
        fi

        if [ "$RUN_CLIENT_SMOKE" -eq 1 ]; then
          echo "Client Python changed - running smoke compile"
          python -m py_compile client/main.py
        fi

  issue-management:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v6
        with:
          script: |
            const issueNumber = context.issue.number;
            const repo = { owner: context.repo.owner, repo: context.repo.repo };
            const opener = context.payload.sender.login;

            await github.rest.issues.createComment({
              ...repo,
              issue_number: issueNumber,
              body: `היי @${opener}, תודה על פתיחת ה-Issue! 💪`
            });

            await github.rest.issues.addLabels({
              ...repo,
              issue_number: issueNumber,
              labels: ['triage']
            });

  sync-and-assign:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: read
    steps:
      - uses: actions/github-script@v6
        with:
          script: |
            const prNumber = context.issue.number;
            const repo = { owner: context.repo.owner, repo: context.repo.repo };

            await github.rest.issues.addAssignees({ 
              ...repo, 
              issue_number: prNumber, 
              assignees: [context.payload.sender.login] 
            });

            const body = context.payload.pull_request.body || "";
            const match = body.match(/(?:relates|fixes|closes)\s+#(\d+)/i);
            
            if (match) {
              const issueNumber = match[1];
              const issue = await github.rest.issues.get({ ...repo, issue_number: issueNumber });
              
              if (issue.data.labels.length > 0) {
                await github.rest.issues.addLabels({ 
                  ...repo, 
                  issue_number: prNumber, 
                  labels: issue.data.labels.map(l => l.name) 
                });
              }
              
              if (issue.data.milestone) {
                await github.rest.issues.update({ 
                  ...repo, 
                  issue_number: prNumber, 
                  milestone: issue.data.milestone.number 
                });
              }
            }