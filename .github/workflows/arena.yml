name: CI - Code Quality and Automation

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, edited]
    branches: [ main ]
  issues:
    types: [opened]

# ─── Cancel redundant runs on the same PR ────────────────────────────────────
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ══════════════════════════════════════════════════════════════════════════════
  # 1. PYTHON — Engine + Client (smart targeted test selection)
  # ══════════════════════════════════════════════════════════════════════════════
  test-python:
    name: Python Tests (Engine + Client)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tesseract-ocr

      - name: Install Python dependencies
        run: |
          pip install pytest flake8 mypy
          pip install -r requirements.txt
          if [ -f engine/requirements.txt ]; then pip install -r engine/requirements.txt; fi

      - name: Lint — flake8 (fatal errors only)
        run: |
          flake8 engine/src engine/tests --count --select=E9,F63,F7,F82 \
            --show-source --statistics --exclude=venv,client/.venv || true

      - name: Type check — mypy
        run: |
          mypy engine/src --ignore-missing-imports --exclude venv || true

      - name: Find and run matching tests
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"

          echo "Changed files:"
          echo "$CHANGED"

          TEST_FILES=()
          RUN_ALL_ENGINE=0
          RUN_CLIENT_SMOKE=0
          RUN_CLIENT_TESTS=0

          for FILE in $CHANGED; do
            # Client test file changed → run full client test suite
            if [[ "$FILE" == client/tests/test_*.py ]]; then
              RUN_CLIENT_TESTS=1
              continue
            fi

            # Client source changed → smoke compile + client tests
            if [[ "$FILE" == client/main.py || "$FILE" == client/*.py ]]; then
              RUN_CLIENT_SMOKE=1
              RUN_CLIENT_TESTS=1
            fi

            # Engine test file changed → run it directly
            if [[ "$FILE" == engine/tests/test_*.py ]]; then
              TEST_FILES+=("$FILE")
              continue
            fi

            # Engine source → matching test
            if [[ "$FILE" =~ ^engine/src/.+\.py$ || "$FILE" == "engine/main.py" ]]; then
              BASENAME=$(basename "$FILE" .py)
              TEST_PATH="engine/tests/test_${BASENAME}.py"
              if [ -f "$TEST_PATH" ]; then
                TEST_FILES+=("$TEST_PATH")
              else
                RUN_ALL_ENGINE=1
              fi
            fi

            # Config / workflow changes → full engine suite
            if [[ "$FILE" == "requirements.txt" || \
                  "$FILE" == "engine/requirements.txt" || \
                  "$FILE" == ".github/workflows/arena.yml" ]]; then
              RUN_ALL_ENGINE=1
            fi
          done

          if [ "$RUN_ALL_ENGINE" -eq 1 ]; then
            echo "Running full engine test suite"
            pytest engine/tests -v
          elif [ ${#TEST_FILES[@]} -gt 0 ]; then
            UNIQUE=$(printf "%s\n" "${TEST_FILES[@]}" | sort -u | tr '\n' ' ')
            echo "Running targeted tests: $UNIQUE"
            pytest $UNIQUE -v
          else
            echo "No engine tests triggered — skipping"
          fi

          if [ "$RUN_CLIENT_SMOKE" -eq 1 ]; then
            echo "Client Python changed — running smoke compile"
            python -m py_compile client/main.py
          fi

          if [ "$RUN_CLIENT_TESTS" -eq 1 ]; then
            echo "Running client test suite"
            pip install -r client/requirements.txt --quiet
            pytest client/tests -v
          fi

  # ══════════════════════════════════════════════════════════════════════════════
  # 2. FRONTEND — TypeScript check + Vitest (runs whenever src/ changes)
  # ══════════════════════════════════════════════════════════════════════════════
  test-frontend:
    name: Frontend Tests (TypeScript + Vitest)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc -p tsconfig.app.json

      - name: Run Vitest
        run: npm test

  # ══════════════════════════════════════════════════════════════════════════════
  # 3. BUILD CHECK — Vite production build (catches import/bundle errors)
  # ══════════════════════════════════════════════════════════════════════════════
  build-check:
    name: Vite Build Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: test-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Vite production build
        run: npm run build

  # ══════════════════════════════════════════════════════════════════════════════
  # 4. SQL VALIDATION — syntax check on init.sql changes (real Postgres)
  # ══════════════════════════════════════════════════════════════════════════════
  sql-check:
    name: SQL Syntax Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: arena
          POSTGRES_PASSWORD: arena
          POSTGRES_DB: arena_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if SQL files changed
        id: sql_changed
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep '\.sql$' || true)
          if [ -n "$CHANGED" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "SQL files changed: $CHANGED"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No SQL files changed — skipping"
          fi

      - name: Validate SQL syntax against real Postgres
        if: steps.sql_changed.outputs.changed == 'true'
        env:
          PGPASSWORD: arena
        run: |
          echo "Running init.sql against Postgres 16..."
          psql -h localhost -U arena -d arena_test -v ON_ERROR_STOP=1 -f infra/sql/init.sql
          echo "SQL validation passed."

  # ══════════════════════════════════════════════════════════════════════════════
  # 5. CONTRACTS — Hardhat compile + test (triggers on engine/contracts/ changes)
  # ══════════════════════════════════════════════════════════════════════════════
  test-contracts:
    name: Solidity Contracts (Hardhat)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if contract files changed
        id: contracts_changed
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -E '^engine/contracts/' || true)
          if [ -n "$CHANGED" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Contract files changed: $CHANGED"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No contract files changed — skipping"
          fi

      - name: Set up Node.js 20
        if: steps.contracts_changed.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: engine/contracts/package.json

      - name: Install Hardhat dependencies
        if: steps.contracts_changed.outputs.changed == 'true'
        working-directory: engine/contracts
        run: npm install

      - name: Compile contracts
        if: steps.contracts_changed.outputs.changed == 'true'
        working-directory: engine/contracts
        run: npx hardhat compile

      - name: Run contract tests
        if: steps.contracts_changed.outputs.changed == 'true'
        working-directory: engine/contracts
        run: |
          if [ -d test ] && [ "$(ls -A test 2>/dev/null)" ]; then
            echo "Running Hardhat tests..."
            npx hardhat test
          else
            echo "No contract tests yet — compile-only check passed."
          fi

  # ══════════════════════════════════════════════════════════════════════════════
  # 6b. ENGINE BOOT SMOKE — build the image, start db+engine via compose, and
  #     require /health to turn green. Catches the whole class of "migrations
  #     ran but the engine never actually booted" bugs (Dockerfile changes,
  #     requirements changes, volume-permission drift, missing env, etc.)
  #     BEFORE the PR is merged to main.
  # ══════════════════════════════════════════════════════════════════════════════
  engine-smoke:
    name: Engine Boot Smoke Test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if engine build surface changed
        id: smoke_changed
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | \
            grep -E '^(engine/Dockerfile|engine/entrypoint\.sh|engine/requirements\.txt|docker-compose\.yml|infra/sql/.+\.sql)$' || true)
          if [ -n "$CHANGED" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Engine boot surface changed: $CHANGED"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No engine boot surface change — skipping"
          fi

      - name: Write minimal .env for compose
        if: steps.smoke_changed.outputs.changed == 'true'
        run: |
          cat > .env <<EOF
          DB_PASSWORD=ci_smoke_password
          API_SECRET=ci_smoke_api_secret_not_used_outside_ci
          ENVIRONMENT=development
          CHAIN_ID=97
          EOF

      - name: Build engine + db and wait for health
        if: steps.smoke_changed.outputs.changed == 'true'
        run: |
          set -e
          # Only the services we need — frontend build is covered by build-check.
          docker compose up -d --build arena-db arena-engine

          echo "=== waiting for engine /health (up to 120s) ==="
          OK=0
          for i in $(seq 1 40); do
            if curl -sf --max-time 3 http://localhost:8001/health > /dev/null; then
              OK=1
              echo "  engine healthy after ${i} probe(s)"
              break
            fi
            sleep 3
          done

          if [ "$OK" -ne 1 ]; then
            echo "❌ Engine never became healthy — dumping diagnostics"
            echo "--- docker ps ---"
            docker ps -a
            echo "--- arena-engine logs ---"
            docker logs --tail 200 arena-engine || true
            echo "--- arena-db logs ---"
            docker logs --tail 50 arena-db || true
            exit 1
          fi

      - name: Tear down
        if: always() && steps.smoke_changed.outputs.changed == 'true'
        run: docker compose down -v || true

  # ══════════════════════════════════════════════════════════════════════════════
  # 6. ISSUE MANAGEMENT — auto-label + comment on new issues
  # ══════════════════════════════════════════════════════════════════════════════
  issue-management:
    name: Issue Auto-Triage
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.issue.number;
            const repo = { owner: context.repo.owner, repo: context.repo.repo };
            const opener = context.payload.sender.login;

            await github.rest.issues.createComment({
              ...repo,
              issue_number: issueNumber,
              body: `Hey @${opener}, thanks for opening this issue! 💪`
            });

            await github.rest.issues.addLabels({
              ...repo,
              issue_number: issueNumber,
              labels: ['triage']
            });

  # ══════════════════════════════════════════════════════════════════════════════
  # 7. DEPLOY — SSH into EC2, rebuild engine + frontend, leave DB untouched
  #    Triggers ONLY on push to main (i.e. after a PR is merged).
  #    Tests ran on the PR — this job just ships the green code.
  # ══════════════════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to EC2
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: SSH → restart → migrate → health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd ~/Project-Arena

            echo "=== fail2ban guard ==="
            if ! command -v fail2ban-server &> /dev/null; then
              echo "  fail2ban not installed — installing..."
              sudo apt-get install -y fail2ban
              sudo systemctl enable fail2ban
              sudo systemctl start fail2ban
            elif ! sudo systemctl is-active --quiet fail2ban; then
              echo "  fail2ban installed but not running — starting..."
              sudo systemctl start fail2ban
            else
              echo "  fail2ban already running — skipping"
            fi

            echo "=== git pull ==="
            git pull origin main

            echo "=== CloudWatch Agent ==="
            if ! systemctl list-units --type=service 2>/dev/null | grep -q amazon-cloudwatch-agent; then
              echo "  Installing CloudWatch Agent..."
              wget -q https://s3.amazonaws.com/amazoncloudwatch-agent/ubuntu/amd64/latest/amazon-cloudwatch-agent.deb
              sudo dpkg -i amazon-cloudwatch-agent.deb
              rm -f amazon-cloudwatch-agent.deb
            else
              echo "  CloudWatch Agent already installed — skipping install"
            fi
            sudo cp ~/Project-Arena/infra/cloudwatch/amazon-cloudwatch-agent.json \
              /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json
            sudo /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl \
              -a fetch-config -m ec2 -s \
              -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json
            echo "  CloudWatch Agent running — logs streaming to /arena/ssh/auth + /arena/system/syslog"

            echo "=== authorized_keys monitor ==="
            sudo apt-get install -y inotify-tools -qq
            sudo cp ~/Project-Arena/infra/scripts/monitor-authorized-keys.sh /usr/local/bin/arena-ssh-monitor.sh
            sudo chmod +x /usr/local/bin/arena-ssh-monitor.sh
            sudo cp ~/Project-Arena/infra/systemd/arena-ssh-monitor.service /etc/systemd/system/
            sudo systemctl daemon-reload
            sudo systemctl enable arena-ssh-monitor
            sudo systemctl restart arena-ssh-monitor
            echo "  authorized_keys monitor running"

            echo "=== fail2ban config (slack alerts + sshd jail) ==="
            sudo cp ~/Project-Arena/infra/fail2ban/action.d/slack-arena.conf /etc/fail2ban/action.d/
            sudo cp ~/Project-Arena/infra/fail2ban/jail.d/arena-sshd.conf /etc/fail2ban/jail.d/
            sudo systemctl reload fail2ban || sudo systemctl restart fail2ban
            echo "  fail2ban config applied"

            echo "=== ensure swap is active (frontend build needs it) ==="
            if ! swapon --show | grep -q swapfile; then
              sudo swapon /swapfile && echo "  swapfile activated" || echo "  swapfile not found — continuing"
            else
              echo "  swap already active: $(free -h | awk '/Swap/{print $2}')"
            fi

            echo "=== tear down ==="
            docker-compose down

            echo "=== prune stopped containers + dangling images (keeps layer cache) ==="
            docker container prune -f
            docker image prune -f

            echo "=== cap build cache at 3 GB (evicts oldest layers, keeps recent npm ci cache) ==="
            docker builder prune --keep-storage 3g -f

            echo "=== build frontend (incremental — npm ci layer cached when package.json unchanged) ==="
            docker-compose build --parallel=false arena-frontend

            echo "=== build remaining services ==="
            docker-compose build arena-engine

            echo "=== post-build prune dangling layers ==="
            docker image prune -f

            echo "=== start all services ==="
            docker-compose up -d

            echo "=== daily fraud report cron ==="
            sudo cp ~/Project-Arena/infra/scripts/daily-fraud-report.py /usr/local/bin/arena-fraud-report.py
            sudo chmod +x /usr/local/bin/arena-fraud-report.py
            CRON_LINE="0 7 * * * root /usr/bin/python3 /usr/local/bin/arena-fraud-report.py >> /var/log/arena-fraud-report.log 2>&1"
            echo "$CRON_LINE" | sudo tee /etc/cron.d/arena-fraud-report > /dev/null
            echo "  fraud report cron set — runs daily at 07:00 UTC"

            echo "=== waiting for DB to accept connections ==="
            for i in $(seq 1 15); do
              docker exec arena-db pg_isready -U arena_admin -d arena \
                && break \
                || { echo "DB not ready yet ($i/15)..."; sleep 2; }
            done

            echo "=== running migrations (idempotent — safe every deploy) ==="
            for FILE in ~/Project-Arena/infra/sql/0[0-9][0-9]-*.sql; do
              echo "  → applying $(basename $FILE)"
              docker exec -i arena-db psql -U arena_admin -d arena < "$FILE"
            done
            echo "✅ Migrations complete"

            echo "=== waiting for engine to come up (up to 90s) ==="
            # Previously a single 5s sleep + one curl. That gave a false red on
            # slow cold starts and — worse — hid real container-boot failures
            # behind a premature timeout. Now we poll every 3s for up to 90s
            # AND dump container state on failure so we can diagnose without a
            # second SSH session.
            HEALTH_OK=0
            for i in $(seq 1 30); do
              if curl -sf --max-time 3 http://localhost:8001/health > /dev/null; then
                HEALTH_OK=1
                echo "  engine healthy after ${i} probe(s)"
                break
              fi
              sleep 3
            done

            if [ "$HEALTH_OK" -eq 1 ]; then
              echo "✅ Deploy OK at $(date)"
            else
              echo "❌ Health check failed after 90s — dumping diagnostics"
              echo "--- docker ps ---"
              docker ps -a
              echo "--- arena-engine logs (last 100 lines) ---"
              docker logs --tail 100 arena-engine || true
              exit 1
            fi

  # ══════════════════════════════════════════════════════════════════════════════
  # 8. PR SYNC — auto-assign + inherit labels/milestone from linked issue
  # ══════════════════════════════════════════════════════════════════════════════
  sync-and-assign:
    name: PR Sync & Assign
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: read
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const repo = { owner: context.repo.owner, repo: context.repo.repo };

            await github.rest.issues.addAssignees({
              ...repo,
              issue_number: prNumber,
              assignees: [context.payload.sender.login]
            });

            const body = context.payload.pull_request.body || "";
            const match = body.match(/(?:relates|fixes|closes)\s+#(\d+)/i);

            if (match) {
              const issueNumber = match[1];
              const issue = await github.rest.issues.get({ ...repo, issue_number: issueNumber });

              if (issue.data.labels.length > 0) {
                await github.rest.issues.addLabels({
                  ...repo,
                  issue_number: prNumber,
                  labels: issue.data.labels.map(l => l.name)
                });
              }

              if (issue.data.milestone) {
                await github.rest.issues.update({
                  ...repo,
                  issue_number: prNumber,
                  milestone: issue.data.milestone.number
                });
              }
            }
