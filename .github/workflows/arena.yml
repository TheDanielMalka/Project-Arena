name: CI - Code Quality and Automation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  issues:
    types: [opened]

jobs:
  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        pip install pytest flake8 mypy
    - name: Run flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
    - name: Run mypy
      run: |
        mypy . --ignore-missing-imports || true
    - name: Run tests
      run: |
        pytest tests/ -v
  issue-management:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v6
        with:
          script: |
            const issueNumber = context.issue.number;
            const repo = { owner: context.repo.owner, repo: context.repo.repo };
            const opener = context.payload.sender.login;

            await github.rest.issues.createComment({
              ...repo,
              issue_number: issueNumber,
              body: `היי @${opener}, תודה על פתיחת ה-Issue! 💪`
            });

            await github.rest.issues.addLabels({
              ...repo,
              issue_number: issueNumber,
              labels: ['triage']
            });

  # 3. סנכרון PR עם Issue
  sync-and-assign:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: read
    steps:
      - uses: actions/github-script@v6
        with:
          script: |
            const prNumber = context.issue.number;
            const repo = { owner: context.repo.owner, repo: context.repo.repo };

            await github.rest.issues.addAssignees({ 
              ...repo, 
              issue_number: prNumber, 
              assignees: [context.payload.sender.login] 
            });

            const body = context.payload.pull_request.body || "";
            const match = body.match(/(?:relates|fixes|closes)\s+#(\d+)/i);
            
            if (match) {
              const issueNumber = match[1];
              const issue = await github.rest.issues.get({ ...repo, issue_number: issueNumber });
              
              if (issue.data.labels.length > 0) {
                await github.rest.issues.addLabels({ 
                  ...repo, 
                  issue_number: prNumber, 
                  labels: issue.data.labels.map(l => l.name) 
                });
              }
              
              if (issue.data.milestone) {
                await github.rest.issues.update({ 
                  ...repo, 
                  issue_number: prNumber, 
                  milestone: issue.data.milestone.number 
                });
              }
            }
