name: CI - Code Quality and Automation

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, edited]
    branches: [ main ]
  issues:
    types: [opened]

jobs:
  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y tesseract-ocr
        pip install pytest flake8 mypy
        pip install -r requirements.txt

    - name: Run flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=venv || true

    - name: Run mypy
      run: |
        mypy . --ignore-missing-imports --exclude venv || true

    - name: Find and run matching tests
      run: |
        
        CHANGED=$(git diff --name-only origin/main...HEAD)
        echo "Changed files:"
        echo "$CHANGED"
        
        TEST_FILES=""
        
        for FILE in $CHANGED; do
          BASENAME=$(basename "$FILE" .py)
          
          if [[ "$FILE" != *.py ]]; then
            continue
          fi

          if [[ "$BASENAME" == test_* ]]; then
            continue
          fi
  
          TEST_PATH="tests/test_${BASENAME}.py"
          if [ -f "$TEST_PATH" ]; then
            echo "Found test for $BASENAME: $TEST_PATH"
            TEST_FILES="$TEST_FILES $TEST_PATH"
          fi
        done
   
        if echo "$CHANGED" | grep -qE '(requirements\.txt|\.yml$|\.yaml$)'; then
          echo "General config changed - running all tests"
          pytest tests/ -v
        elif [ -n "$TEST_FILES" ]; then
          echo "Running targeted tests:$TEST_FILES"
          pytest $TEST_FILES -v
        else
          echo "No matching tests found - skipping"
        fi

  issue-management:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v6
        with:
          script: |
            const issueNumber = context.issue.number;
            const repo = { owner: context.repo.owner, repo: context.repo.repo };
            const opener = context.payload.sender.login;

            await github.rest.issues.createComment({
              ...repo,
              issue_number: issueNumber,
              body: `היי @${opener}, תודה על פתיחת ה-Issue! 💪`
            });

            await github.rest.issues.addLabels({
              ...repo,
              issue_number: issueNumber,
              labels: ['triage']
            });

  sync-and-assign:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: read
    steps:
      - uses: actions/github-script@v6
        with:
          script: |
            const prNumber = context.issue.number;
            const repo = { owner: context.repo.owner, repo: context.repo.repo };

            await github.rest.issues.addAssignees({ 
              ...repo, 
              issue_number: prNumber, 
              assignees: [context.payload.sender.login] 
            });

            const body = context.payload.pull_request.body || "";
            const match = body.match(/(?:relates|fixes|closes)\s+#(\d+)/i);
            
            if (match) {
              const issueNumber = match[1];
              const issue = await github.rest.issues.get({ ...repo, issue_number: issueNumber });
              
              if (issue.data.labels.length > 0) {
                await github.rest.issues.addLabels({ 
                  ...repo, 
                  issue_number: prNumber, 
                  labels: issue.data.labels.map(l => l.name) 
                });
              }
              
              if (issue.data.milestone) {
                await github.rest.issues.update({ 
                  ...repo, 
                  issue_number: prNumber, 
                  milestone: issue.data.milestone.number 
                });
              }
            }