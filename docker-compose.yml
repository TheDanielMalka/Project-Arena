# ╔══════════════════════════════════════════════════════════════╗
# ║  ARENA — Full Stack Docker Compose                         ║
# ║  Services: PostgreSQL · Frontend (Nginx) · Python Engine   ║
# ║  Start: docker compose up -d --build                       ║
# ╚══════════════════════════════════════════════════════════════╝

services:
  # ─── PostgreSQL 16 ──────────────────────────────────────────
  arena-db:
    image: postgres:16-alpine
    container_name: arena-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: arena
      POSTGRES_USER: arena_admin
      # DB_PASSWORD is REQUIRED — no fallback. The previous
      # `${DB_PASSWORD:-arena_secret_change_me}` meant a .env misconfig booted
      # Postgres with a public, well-known password (audit 2026-04-20). Using
      # `${VAR:?message}` makes `docker compose up` fail fast with a readable
      # error instead of silently degrading security.
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required — set it in .env before `docker compose up`}
    ports:
      # Bind to loopback only — the engine reaches Postgres over the internal
      # `arena-net` Docker bridge (service name `arena-db`), so no external
      # publication is needed. Prior `"5432:5432"` exposed the DB on every
      # host interface (audit 2026-04-20: remote brute-force / leaked creds).
      # Host-side tooling (psql, pg_dump) still works via 127.0.0.1.
      - "127.0.0.1:5432:5432"
    volumes:
      - arena-pgdata:/var/lib/postgresql/data
      - ./infra/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - arena-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arena_admin -d arena"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── React Frontend (Nginx) ────────────────────────────────
  arena-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_ENGINE_API_URL: ${VITE_ENGINE_API_URL:-http://localhost:8001}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8001/ws}
        VITE_CONTRACT_ADDRESS: ${VITE_CONTRACT_ADDRESS:-}
        VITE_CHAIN_ID: ${CHAIN_ID:-97}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
        VITE_ENGINE_API_TOKEN: ${VITE_ENGINE_API_TOKEN:-}
        VITE_WALLETCONNECT_PROJECT_ID: ${VITE_WALLETCONNECT_PROJECT_ID:-}
        VITE_LANDING_HERO_VIDEO: ${VITE_LANDING_HERO_VIDEO:-}
        VITE_AVATAR_CDN_BASE: ${VITE_AVATAR_CDN_BASE:-}
        VITE_IDENTITY_PORTRAITS: ${VITE_IDENTITY_PORTRAITS:-}
        VITE_LEGAL_GOVERNING_LAW: ${VITE_LEGAL_GOVERNING_LAW:-}
        VITE_LEGAL_ARBITRATION_BODY: ${VITE_LEGAL_ARBITRATION_BODY:-}
        VITE_LEGAL_ARBITRATION_SEAT: ${VITE_LEGAL_ARBITRATION_SEAT:-}
        VITE_LEGAL_ENTITY_NAME: ${VITE_LEGAL_ENTITY_NAME:-}
        VITE_LEGAL_REGISTERED_ADDRESS: ${VITE_LEGAL_REGISTERED_ADDRESS:-}
        VITE_LEGAL_DPO_DETAILS: ${VITE_LEGAL_DPO_DETAILS:-}
        VITE_LEGAL_DPO_CONTACT: ${VITE_LEGAL_DPO_CONTACT:-}
    container_name: arena-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/ssl/cloudflare:/etc/ssl/cloudflare:ro
    depends_on:
      arena-db:
        condition: service_healthy
    networks:
      - arena-net

  # ─── Python Engine (OCR + Capture + Matcher + API) ─────────
  arena-engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: arena-engine
    restart: unless-stopped
    environment:
      # Engine builds DATABASE_URL in code (percent-encoded) when DATABASE_URL is unset — safe for special chars in DB_PASSWORD.
      # Override DATABASE_URL in `.env` for external Postgres (password must be URL-encoded in the string if it has @ / : # etc.).
      DATABASE_URL: ${DATABASE_URL:-}
      POSTGRES_HOST: arena-db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: arena_admin
      # Same reason as the arena-db service — fail fast, no insecure default.
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required — set it in .env before `docker compose up`}
      POSTGRES_DB: arena
      API_SECRET: ${API_SECRET:-change_me_in_production}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      SCREENSHOT_INTERVAL: ${SCREENSHOT_INTERVAL:-5}
      SCREENSHOT_DIR: /app/screenshots
      EVIDENCE_DIR: /app/evidence
      UPLOAD_REPORTS_DIR: ${UPLOAD_REPORTS_DIR:-/app/uploads/reports}
      PRIVATE_KEY: ${PRIVATE_KEY:-}
      WALLET_ADDRESS: ${WALLET_ADDRESS:-}
      BINANCE_API_KEY: ${BINANCE_API_KEY:-}
      BINANCE_SECRET: ${BINANCE_SECRET:-}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      STEAM_API_KEY: ${STEAM_API_KEY:-}
      ENGINE_BASE_URL: ${ENGINE_BASE_URL:-http://localhost:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      BLOCKCHAIN_RPC_URL: ${BLOCKCHAIN_RPC_URL:-}
      CONTRACT_ADDRESS: ${CONTRACT_ADDRESS:-}
      CHAIN_ID: ${CHAIN_ID:-97}
      OWNER_PRIVATE_KEY: ${OWNER_PRIVATE_KEY:-}
      SLACK_ALERTS_WEBHOOK_URL: ${SLACK_ALERTS_WEBHOOK_URL:-}
      USDT_CONTRACT_ADDRESS: ${USDT_CONTRACT_ADDRESS:-}
      AT_PER_USDT: ${AT_PER_USDT:-10}
      AT_PER_USDT_WITHDRAW: ${AT_PER_USDT_WITHDRAW:-105}
      AT_DAILY_WITHDRAW_LIMIT: ${AT_DAILY_WITHDRAW_LIMIT:-10000}
      PLATFORM_WALLET_ADDRESS: ${PLATFORM_WALLET_ADDRESS:-}
      SSH_KEY_PATH: ${SSH_KEY_PATH:-}
      ORACLE_API_KEY: ${ORACLE_API_KEY:-}
      CLIENT_VERSION: ${CLIENT_VERSION:-0.1.0}
      PROCESS_POLL_INTERVAL: ${PROCESS_POLL_INTERVAL:-3}
      HEARTBEAT_INTERVAL: ${HEARTBEAT_INTERVAL:-15}
      MIN_CLIENT_VERSION: ${MIN_CLIENT_VERSION:-1.0.0}
      ARENA_SYSTEM_USER_ID: ${ARENA_SYSTEM_USER_ID:-}
      RAGE_QUIT_THRESHOLD_SECONDS: ${RAGE_QUIT_THRESHOLD_SECONDS:-300}
      RAGE_QUIT_CHECK_INTERVAL_SECONDS: ${RAGE_QUIT_CHECK_INTERVAL_SECONDS:-60}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      FACEIT_API_KEY: ${FACEIT_API_KEY:-}
      FACEIT_CLIENT_ID: ${FACEIT_CLIENT_ID:-}
      FACEIT_CLIENT_SECRET: ${FACEIT_CLIENT_SECRET:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      DISCORD_MATCH_CATEGORY_ID: ${DISCORD_MATCH_CATEGORY_ID:-}
      DISCORD_LOBBY_WEBHOOK_URL: ${DISCORD_LOBBY_WEBHOOK_URL:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-Arena <noreply@project-arena.com>}
    ports:
      - "8001:8000"
    volumes:
      # Screenshots — fast host-mount for capture output
      - arena-screenshots:/app/screenshots
      # Evidence — persisted game proof files
      - arena-evidence:/app/evidence
      # Logs — engine runtime logs
      - arena-engine-logs:/app/logs
      # Templates — reference images for the matcher (read-only host mount)
      - ./engine/templates:/app/templates:ro
    depends_on:
      arena-db:
        condition: service_healthy
    networks:
      - arena-net

# ─── Volumes ──────────────────────────────────────────────────
volumes:
  arena-pgdata:
    name: arena-pgdata
    driver: local
  arena-screenshots:
    name: arena-screenshots
    driver: local
  arena-evidence:
    name: arena-evidence
    driver: local
  arena-engine-logs:
    name: arena-engine-logs
    driver: local

# ─── Networks ─────────────────────────────────────────────────
networks:
  arena-net:
    name: arena-net
    driver: bridge
