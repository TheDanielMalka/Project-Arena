[Definition]
actionban = WEBHOOK=$(grep -m1 'SLACK_ALERTS_WEBHOOK_URL' /home/ubuntu/Project-Arena/.env | cut -d'=' -f2- | tr -d '"' | tr -d "'"); \
            curl -s -X POST "$WEBHOOK" \
              -H 'Content-type: application/json' \
              -d "{\"text\":\"🚨 *SSH Intrusion Attempt* — IP <ip> banned after <failures> failed attempts | jail: <name> | host: $(hostname)\"}" || true

actionunban = WEBHOOK=$(grep -m1 'SLACK_ALERTS_WEBHOOK_URL' /home/ubuntu/Project-Arena/.env | cut -d'=' -f2- | tr -d '"' | tr -d "'"); \
              curl -s -X POST "$WEBHOOK" \
                -H 'Content-type: application/json' \
                -d "{\"text\":\"✅ *SSH* — IP <ip> unbanned from <name> jail | host: $(hostname)\"}" || true
