# ─────────────────────────────────────────────────────────────────────────────
# Arena frontend — Nginx config
#
# This container listens on :80. In production an outer TLS terminator
# (EC2 host nginx / ALB / Cloudflare) handles HTTPS and forwards plaintext
# HTTP to this container. That is why we do NOT `listen 443 ssl` here.
#
# Security hardening (audit, 2026-04-20):
#   - HSTS: tells browsers to use HTTPS for 1y (with subdomains). Safe to
#     emit even over plaintext-in-container because the outer terminator
#     delivers it to the client over TLS, where the browser honors it.
#   - X-Content-Type-Options: nosniff — blocks MIME-type guessing.
#   - X-Frame-Options: DENY — blocks clickjacking via <iframe>.
#   - Referrer-Policy: strict-origin-when-cross-origin — GDPR-friendly default.
#   - Permissions-Policy: drops access to sensors/mic/cam the app doesn't use.
#   - Content-Security-Policy-Report-Only: staged rollout — reports violations
#     but does NOT block. Flip to `Content-Security-Policy` (enforce) once
#     the report stream is quiet for a few days.
#   - 80→443 redirect: only when `X-Forwarded-Proto: http` — i.e. the outer
#     terminator tells us the client actually came in plaintext. Otherwise
#     (HTTPS-terminated → forwarded as HTTP inside the cluster) we do NOT
#     redirect, to avoid an infinite loop behind the proxy.
# ─────────────────────────────────────────────────────────────────────────────

# Security headers — applied to every response via `add_header ... always;`.
# Kept in a `map` so we can toggle per-environment in the future without
# editing every `location` block.
map $sent_http_content_type $arena_csp_report_only {
    # Report-only CSP covers SPA assets + engine/api + WebSocket.
    # Tune after monitoring violation reports; tighten script-src 'unsafe-*'
    # once inline styles/scripts are fully audited.
    default "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'";
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Force HTTPS when client arrived over plain HTTP at the outer edge.
    # X-Forwarded-Proto is set by the TLS terminator in front of this container.
    # If the header is absent (direct dev access), we don't redirect.
    if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$request_uri;
    }

    # ── Security headers (applied to every response).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), accelerometer=(), gyroscope=()" always;
    add_header Content-Security-Policy-Report-Only $arena_csp_report_only always;

    # SPA — fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to Python engine
    location /api/ {
        proxy_pass http://arena-engine:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        # Re-apply security headers inside this location block (nginx
        # `add_header` does NOT inherit into nested blocks that define
        # their own add_header directives).
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}
