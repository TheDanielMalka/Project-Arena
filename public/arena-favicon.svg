<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="PROJECT ARENA">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Chamfered dark background -->
  <polygon points="10,0 54,0 64,10 64,54 54,64 10,64 0,54 0,10" fill="#080d14"/>
  <!-- Outer border rim -->
  <polygon points="10,0 54,0 64,10 64,54 54,64 10,64 0,54 0,10" fill="none" stroke="#E42535" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Subtle scan line overlay -->
  <polygon points="10,0 54,0 64,10 64,54 54,64 10,64 0,54 0,10"
    fill="url(#scanlines)" fill-opacity="0.04"/>

  <!-- Geometric A — outer glow layer -->
  <g filter="url(#glow2)" opacity="0.5">
    <line x1="16" y1="51" x2="32" y2="13" stroke="#E42535" stroke-width="6" stroke-linecap="square"/>
    <line x1="32" y1="13" x2="48" y2="51" stroke="#E42535" stroke-width="6" stroke-linecap="square"/>
    <line x1="22" y1="37" x2="42" y2="37" stroke="#E42535" stroke-width="5" stroke-linecap="square"/>
  </g>
  <!-- Geometric A — sharp inner layer -->
  <g filter="url(#glow)">
    <line x1="16" y1="51" x2="32" y2="13" stroke="#E42535" stroke-width="4" stroke-linecap="square"/>
    <line x1="32" y1="13" x2="48" y2="51" stroke="#E42535" stroke-width="4" stroke-linecap="square"/>
    <line x1="22" y1="37" x2="42" y2="37" stroke="#ff6b6b" stroke-width="3" stroke-linecap="square"/>
  </g>

  <!-- Corner HUD ticks -->
  <g stroke="#E42535" stroke-width="1.5" stroke-opacity="0.75" fill="none">
    <path d="M4,11 L4,4 L11,4"/>
    <path d="M53,4 L60,4 L60,11"/>
    <path d="M4,53 L4,60 L11,60"/>
    <path d="M53,60 L60,60 L60,53"/>
  </g>
</svg>
